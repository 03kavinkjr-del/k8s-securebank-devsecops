apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: {{ include "securebank.fullname" . }}
  namespace: securebank

spec:
  podSelector:
    matchLabels:
      {{- include "securebank.selectorLabels" . | nindent 6 }}

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - {}

  egress:
    - {}
