apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "securebank.fullname" . }}
  namespace: securebank

  labels:
    {{- include "securebank.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      {{- include "securebank.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "securebank.selectorLabels" . | nindent 8 }}

    spec:
      automountServiceAccountToken: false

      serviceAccountName: {{ include "securebank.serviceAccountName" . }}

      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      containers:
        - name: securebank

          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}

          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
