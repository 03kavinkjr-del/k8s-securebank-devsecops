apiVersion: apps/v1
kind: Deployment

metadata:
  name: securebank-api
  namespace: securebank

spec:
  replicas: 2

  selector:
    matchLabels:
      app: securebank-api

  template:
    metadata:
      labels:
        app: securebank-api

    spec:
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 10000

        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: api

          image: securebank-api:v1
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

            capabilities:
              drop:
                - ALL

          livenessProbe:
            httpGet:
              path: /health
              port: 5000

            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 5000

            initialDelaySeconds: 5
            periodSeconds: 5

          resources:
            limits:
              cpu: "250m"
              memory: "256Mi"

            requests:
              cpu: "100m"
              memory: "128Mi"
